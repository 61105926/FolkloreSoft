services:

  # ── Backend (NestJS) ─────────────────────────────────────────────────────────
  # La base de datos PostgreSQL es EXTERNA (servicio gestionado en Coolify).
  # Define DATABASE_URL en el .env con la URL de tu servicio PostgreSQL de Coolify.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      FRONTEND_URL: ${FRONTEND_URL}
      PORT: 8001
    expose:
      - "8001"

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8001
    restart: always
    environment:
      BACKEND_URL: http://backend:8001
      NODE_ENV: production
      PORT: 3001
    depends_on:
      - backend
    expose:
      - "3001"

services:

  # ── Backend (NestJS) ─────────────────────────────────────────────────────────
  # La base de datos PostgreSQL es EXTERNA (servicio gestionado en Coolify).
  # Define DATABASE_URL en el .env con la URL de tu servicio PostgreSQL de Coolify.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      FRONTEND_URL: ${FRONTEND_URL}
      PORT: 4002
    expose:
      - "4002"
    networks:
      - default
      - coolify

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:4002
    restart: always
    environment:
      BACKEND_URL: http://backend:4002
      NODE_ENV: production
      PORT: 3002
    depends_on:
      - backend
    expose:
      - "3002"
    networks:
      - default
      - coolify

# La red 'coolify' es la red compartida del proxy de Coolify (ya existe en el host).
# Conectar el backend a ella permite resolver el hostname interno del servicio
# PostgreSQL gestionado (p. ej. i39ev72uop4se7zwu482wp27).
networks:
  default:
  coolify:
    external: true

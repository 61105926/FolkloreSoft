[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:backend]
command=sh -c "npx prisma migrate deploy && node dist/src/main.js"
directory=/app/backend
autostart=true
autorestart=true
priority=1
environment=NODE_ENV="production",PORT="9001"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:frontend]
command=node server.js
directory=/app/frontend
autostart=true
autorestart=true
priority=2
environment=NODE_ENV="production",PORT="9002",BACKEND_URL="http://localhost:9001"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
